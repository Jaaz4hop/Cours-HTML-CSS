    <section>
        <form method="post" action="contact.php">
            <fieldset>
                <legend>Veuillez renseigner vos coordonées pour nous contacter.</legend>
                <div class="form">
                    <label for="nom">Nom:<span>*</span></label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" maxlength="20" minlength="2" required autofocus>
                </div>
                <div class="form">
                    <label for="mail">E-mail:<span>*</span></label>
                    <input type="mail" id="name" name="mail" placeholder="Votreadresse@mail.com" required>
                </div>
                <div class="form">
                    <label for="commentaire">Commentaire</label>
                    <textarea  id="commentaire" name="commentaire" placeholder="Dites-nous ce que vous voulez" cols="70" rows="10"></textarea>
                </div>
                <div class="form">
                    <label for="copy">Copie</label>
                    <input type="checkbox" id="copy" name="copy" checked>
                </div>
                <div class="form">
                    <input type="submit" id="submit" name="submit" value="Envoyer">
                    <input type="reset" id="reset" name="reset" value="Réinitialiser">
                </div>
            </fieldset>
        </form>
    </section>
