<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de vente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
    <header class="container-fluid bg-dark">
    <h1 class="text-light">EcoWear</h1>
    </header>
    <main>
        <section class="container d-flex flex-column align-items-center justify-content-evenly">
            <h2 class="fw-bold">T-shirt coton bio</h2>
            <p>Produit simple et confortable</p>
            <img src="Images/tshirt-coton-organique.png" alt="t-shirt en coton bio">
            <button class="btn btn-primary mt-3 mb-5">Acheter</button>
        </section>
        <section class="container mt-5">
            <div class="btn-group d-flex justify-content-center mb-5">
                <button class="btn btn-lg btn-outline-secondary">Coton Bio</button>
                <button class="btn btn-lg btn-outline-secondary">Confort</button>
                <button class="btn btn-lg btn-outline-secondary">Durable</button>
            </div>
            <div class="d-flex flex-column align-items-center">
                <h2 class="fw-bold fs-1">29€</h2>
                <button class="btn btn-lg btn-outline-dark mb-5">Commander</button>
            </div>
        </section>
        <form class="container d-flex flex-column align-items-center">
            <h2 class="fw-bold fs-1">Contact</h2>
            <div class="row w-50 my-3">
                <label for="Name" class="col-1">Nom</label>
                <input type="text" id="Name" class="col-12 form-control form-control-lg">
            </div>
            <div class="row w-50 mb-3">
            <label for="mail" class="col-1">Email</label>
            <input type="mail" name="mail" id="mail" class="col-12 form-control form-control-lg">
            </div>
            <button class="btn btn-lg btn-dark w-50">Envoyer</button>
        </form>
    </main>
    <footer class="container-fluid d-flex bg-dark justify-content-center fixed-bottom">
        <h2 class="text-light">EcoWear</h2>
    </footer>
</body>
